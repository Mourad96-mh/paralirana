# Render Blueprint for Para Lirana — the Express API ONLY.
#
# Architecture (split, like algopharma):
#   • Frontend  → Next.js static export (codebase/), built to `out/`, hosted on Hostinger.
#   • Backend   → this Express API (codebase/server/), hosted here on Render.
#   • Data      → MongoDB Atlas + Cloudinary (external).
#
# Secrets are marked `sync: false` — set their real values in the Render dashboard.
services:
  - type: web
    name: paralirana-api
    runtime: node
    rootDir: codebase/server
    # $7/mo, always awake (no cold starts on checkout/admin). Change to `free` to
    # test for free, but free sleeps after 15 min idle → ~50s cold start.
    plan: starter
    region: frankfurt # closest to Morocco; options: oregon, ohio, virginia, singapore
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true # redeploy on every push to the connected branch
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Origins allowed to call the API (the storefront on Hostinger + local dev).
      - key: CORS_ORIGIN
        value: https://paralirana.com,https://www.paralirana.com,http://localhost:3000
      # --- set these real values in the Render dashboard ---
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
